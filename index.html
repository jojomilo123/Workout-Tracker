<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
  <meta name="theme-color" content="#101518">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="Form">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="apple-touch-icon" href="apple-touch-icon.png">
  <link rel="icon" type="image/png" sizes="192x192" href="icon-192.png">
  <link rel="icon" type="image/svg+xml" href="icon.svg">
  <title>Form — Workout Tracker</title>
  <style>
    :root {
      --ink: #f6f7f4;
      --muted: #9ba7a6;
      --quiet: #5e6b6b;
      --bg: #101518;
      --panel: #182023;
      --panel-2: #202a2e;
      --line: #2b383b;
      --lime: #c9f66b;
      --mint: #72e4c1;
      --danger: #ff8a82;
      --shadow: 0 16px 38px rgba(0,0,0,.26);
    }
    *, *::before, *::after { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    html, body { margin: 0; padding: 0; width: 100%; max-width: 100%; overflow-x: hidden; }
    body { min-height: 100dvh; background: var(--bg); color: var(--ink); font: 15px/1.4 -apple-system, BlinkMacSystemFont, "SF Pro Text", "Helvetica Neue", sans-serif; padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom); }
    button, input { font: inherit; } button { color: inherit; cursor: pointer; }
    button:focus-visible, input:focus-visible { outline: 2px solid var(--mint); outline-offset: 2px; }

    .app { max-width: 640px; width: 100%; margin: auto; min-height: 100dvh; padding: 18px 16px 100px; overflow-x: hidden; }
    .top { display: flex; align-items: center; justify-content: space-between; gap: 12px; margin: 5px 2px 18px; }
    .eyebrow { color: var(--mint); font-size: 11px; font-weight: 800; letter-spacing: .14em; text-transform: uppercase; }
    h1 { margin: 1px 0 0; font-size: 29px; letter-spacing: -.05em; line-height: 1; }
    .icon-btn { width: 42px; height: 42px; border: 1px solid var(--line); border-radius: 50%; display: grid; place-items: center; background: var(--panel); font-size: 19px; }

    .view-tabs { display: grid; grid-template-columns: repeat(3,1fr); gap: 6px; background: var(--panel); padding: 5px; border-radius: 16px; border: 1px solid var(--line); margin-bottom: 20px; }
    .tab-btn { border: 0; background: transparent; color: var(--muted); padding: 8px 4px; border-radius: 12px; font-size: 12px; font-weight: 750; text-align: center; transition: .2s; }
    .tab-btn.active { background: var(--panel-2); color: var(--lime); border: 1px solid var(--line); }

    .week { display: grid; grid-template-columns: repeat(7,1fr); gap: 5px; margin-bottom: 20px; width: 100%; }
    .day { min-height: 58px; border: 1px solid transparent; background: transparent; border-radius: 15px; padding: 7px 2px; color: var(--muted); text-align: center; font-size: 11px; font-weight: 700; line-height: 1.2; width: 100%; }
    .day b { display: grid; place-items: center; width: 28px; height: 28px; border-radius: 50%; margin: 4px auto 0; font-size: 13px; color: var(--ink); font-weight: 750; }
    .day.active { background: var(--panel-2); border-color: var(--line); color: var(--ink); }
    .day.active b { background: var(--lime); color: #172014; }
    .day.done b { background: var(--mint); color: #10211c; }
    .day.rest { opacity: .45; }

    .hero { border: 1px solid #334344; border-radius: 24px; background: linear-gradient(135deg,#233033,#182124 72%); padding: 20px; box-shadow: var(--shadow); overflow: hidden; position: relative; margin-bottom: 15px; max-width: 100%; }
    .hero:after { content: ""; position: absolute; width: 148px; height: 148px; background: var(--lime); filter: blur(2px); border-radius: 50%; opacity: .11; right: -65px; top: -67px; }
    .hero-row { display: flex; align-items: flex-start; justify-content: space-between; gap: 12px; position: relative; z-index: 1; }
    .hero h2 { font-size: 25px; letter-spacing: -.04em; margin: 2px 0 4px; line-height: 1.08; }
    .hero p { margin: 0; color: var(--muted); font-size: 13px; }
    .score { font-size: 33px; line-height: .9; font-weight: 800; letter-spacing: -.06em; color: var(--lime); text-align: right; }
    .score small { display: block; color: var(--muted); font-size: 10px; letter-spacing: .08em; text-transform: uppercase; margin-top: 6px; }
    .track { height: 7px; margin-top: 19px; border-radius: 9px; overflow: hidden; background: #0e1516; position: relative; z-index: 1; }
    .fill { height: 100%; width: 0; border-radius: inherit; background: linear-gradient(90deg,var(--mint),var(--lime)); transition: width .35s ease; }

    .quick { display: grid; grid-template-columns: 1fr 1fr; gap: 9px; margin-bottom: 22px; width: 100%; }
    .quick-card { background: var(--panel); border: 1px solid var(--line); border-radius: 16px; padding: 12px 14px; min-width: 0; }
    .quick-card span { display: block; color: var(--muted); font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; }
    .quick-card b { display: block; font-size: 21px; letter-spacing: -.04em; margin-top: 2px; color: var(--lime); }

    .section-head { display: flex; justify-content: space-between; align-items: baseline; margin: 0 2px 11px; }
    .section-head h3 { margin: 0; font-size: 17px; letter-spacing: -.025em; }
    .section-head button { border: 0; background: none; color: var(--mint); padding: 5px; font-size: 12px; font-weight: 700; }

    .exercise { background: var(--panel); border: 1px solid var(--line); border-radius: 18px; margin-bottom: 10px; overflow: hidden; transition: border-color .2s, background .2s; width: 100%; }
    .exercise.completed { background: #1a2927; border-color: #3c5f55; }
    .exercise-main { width: 100%; border: 0; background: none; display: flex; align-items: center; padding: 15px 14px; gap: 12px; text-align: left; }
    .check { flex: 0 0 25px; height: 25px; border-radius: 50%; border: 1.5px solid #657473; display: grid; place-items: center; color: transparent; font-size: 13px; }
    .completed .check { background: var(--mint); color: #11201c; border-color: var(--mint); }
    .exercise-info { min-width: 0; flex: 1; }
    .exercise-name { font-size: 15px; font-weight: 750; letter-spacing: -.02em; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
    .completed .exercise-name { color: #b7c9c6; text-decoration: line-through; }
    .exercise-meta { color: var(--muted); font-size: 12px; margin-top: 2px; }
    .chevron { font-size: 18px; color: var(--muted); transition: .2s; }
    .exercise.open .chevron { transform: rotate(90deg); }
    .detail { display: none; border-top: 1px solid var(--line); padding: 13px 14px 14px; }
    .open .detail { display: block; }
    .sets-label { color: var(--muted); font-size: 10px; font-weight: 800; letter-spacing: .1em; text-transform: uppercase; display: grid; grid-template-columns: 28px 1fr 1fr 39px; gap: 7px; padding: 0 4px 7px; }
    .set { display: grid; grid-template-columns: 28px 1fr 1fr 39px; gap: 7px; align-items: center; margin-bottom: 7px; }
    .set-no { color: var(--muted); text-align: center; font-size: 12px; font-weight: 700; }
    .set input { width: 100%; min-width: 0; height: 38px; border: 1px solid var(--line); background: #11191b; color: var(--ink); border-radius: 9px; padding: 0 8px; text-align: center; appearance: none; -webkit-appearance: none; }
    .set input::placeholder { color: #556162; }
    .set-done { height: 38px; border: 1px solid var(--line); background: #11191b; border-radius: 9px; color: var(--quiet); font-size: 16px; }
    .set-done.on { background: rgba(114,228,193,.14); border-color: var(--mint); color: var(--mint); }
    .add-set { width: 100%; background: transparent; border: 1px dashed #526363; color: var(--mint); border-radius: 9px; height: 37px; margin-top: 3px; font-size: 12px; font-weight: 700; }
    .rest-card { border: 1px solid var(--line); background: var(--panel); border-radius: 22px; padding: 35px 23px; text-align: center; }
    .rest-card .moon { font-size: 38px; }
    .rest-card h2 { margin: 8px 0 5px; font-size: 23px; letter-spacing: -.04em; }
    .rest-card p { color: var(--muted); margin: 0 auto; max-width: 260px; font-size: 13px; }
    .reset-btn { width: 100%; margin-top: 12px; padding: 11px; border: 0; background: transparent; color: #869292; font-size: 12px; }

    .sheet { position: fixed; inset: 0; z-index: 5; display: none; align-items: flex-end; background: rgba(0,0,0,.54); backdrop-filter: blur(3px); }
    .sheet.show { display: flex; }
    .sheet-inner { width: min(640px,100%); margin: auto; background: #20292d; border: 1px solid #3b4a4c; border-radius: 24px 24px 0 0; padding: 12px 16px calc(22px + env(safe-area-inset-bottom)); }
    .handle { width: 38px; height: 4px; background: #6b7776; border-radius: 4px; margin: 0 auto 19px; }
    .sheet h2 { margin: 0 0 14px; font-size: 20px; letter-spacing: -.04em; }
    .field { margin-bottom: 12px; }
    .field label { display: block; color: var(--muted); font-size: 11px; font-weight: 700; margin: 0 0 5px 3px; }
    .field input { width: 100%; height: 44px; background: #11191b; border: 1px solid var(--line); color: var(--ink); border-radius: 11px; padding: 0 12px; }
    .save-btn { width: 100%; height: 48px; border: 0; background: var(--lime); color: #172014; border-radius: 13px; font-weight: 800; margin-top: 3px; }

    .chart-card { background: var(--panel); border: 1px solid var(--line); border-radius: 20px; padding: 16px; margin-bottom: 16px; box-shadow: var(--shadow); overflow: hidden; max-width: 100%; min-width: 0; }
    .chart-card h4 { margin: 0 0 12px; font-size: 13px; font-weight: 750; color: var(--muted); text-transform: uppercase; letter-spacing: .06em; }
    .chart-wrap { width: 100%; height: 180px; position: relative; overflow: hidden; max-width: 100%; min-width: 0; }
    .chart-wrap canvas { position: absolute; inset: 0; width: 100%; height: 100%; display: block; }

    .tool-btn { border: 1px solid var(--line); background: var(--panel-2); color: var(--ink); border-radius: 10px; padding: 8px 14px; font-size: 12px; font-weight: 750; margin-right: 6px; margin-bottom: 8px; }

    .view-section { display: none; }
    .view-section.active { display: block; }

    .toast { position: fixed; bottom: calc(22px + env(safe-area-inset-bottom)); left: 50%; transform: translate(-50%,16px); opacity: 0; pointer-events: none; transition: .24s; background: #e8f4ef; color: #13201c; padding: 10px 14px; border-radius: 99px; font-size: 13px; font-weight: 750; box-shadow: var(--shadow); white-space: nowrap; z-index: 20; }
    .toast.show { transform: translate(-50%,0); opacity: 1; }

    @media (min-width:641px) { body { background: #0b0f11; } .app { border-left: 1px solid #263235; border-right: 1px solid #263235; } }
  </style>
</head>
<body>
<main class="app">
  <header class="top">
    <div>
      <div class="eyebrow" id="dateLabel"></div>
      <h1>Form</h1>
    </div>
    <button class="icon-btn" id="btnAddEx" aria-label="Add exercise">⋯</button>
  </header>

  <nav class="view-tabs">
    <button class="tab-btn active" data-tab="view-workout">Workout</button>
    <button class="tab-btn" data-tab="view-charts">Progress</button>
    <button class="tab-btn" data-tab="view-backup">Backup</button>
  </nav>

  <!-- WORKOUT TAB -->
  <section class="view-section active" id="view-workout">
    <nav class="week" id="week"></nav>
    <section id="hero"></section>
    <div class="quick">
      <div class="quick-card"><span>This week</span><b id="statWeek">0 / 0</b></div>
      <div class="quick-card"><span>Today</span><b id="statToday">0 / 0</b></div>
    </div>
    <div id="workout"></div>
  </section>

  <!-- PROGRESS TAB -->
  <section class="view-section" id="view-charts">
    <div class="quick" style="margin-bottom:16px">
      <div class="quick-card"><span>Active days (7d)</span><b id="cStreak">0</b></div>
      <div class="quick-card"><span>Weekly rate</span><b id="cRate">0%</b></div>
    </div>
    <div class="chart-card">
      <h4>Daily Activity — Last 7 Days</h4>
      <div class="chart-wrap"><canvas id="cvLine"></canvas></div>
    </div>
    <div class="chart-card">
      <h4>This Week — Exercises Completed</h4>
      <div class="chart-wrap"><canvas id="cvBar"></canvas></div>
    </div>
    <div class="chart-card">
      <h4>Today — Completion Rate</h4>
      <div class="chart-wrap"><canvas id="cvDot"></canvas></div>
    </div>
  </section>

  <!-- BACKUP TAB -->
  <section class="view-section" id="view-backup">
    <div class="chart-card">
      <h4>Backup & Restore</h4>
      <p style="color:var(--muted);font-size:13px;margin:0 0 14px">All progress saves automatically. Export to keep a copy.</p>
      <button class="tool-btn" id="btnExport">Export JSON</button>
      <button class="tool-btn" id="btnImport">Import JSON</button>
      <input type="file" id="fileInput" accept=".json" style="display:none">
    </div>
    <div class="chart-card">
      <h4>Reset All Data</h4>
      <p style="color:var(--muted);font-size:13px;margin:0 0 14px">Permanently erase all workout history.</p>
      <button class="tool-btn" id="btnReset" style="color:var(--danger);border-color:rgba(255,138,130,.35)">Reset All Data</button>
    </div>
  </section>
</main>

<!-- Add Exercise Sheet -->
<div class="sheet" id="sheet">
  <div class="sheet-inner">
    <div class="handle"></div>
    <h2>Add exercise</h2>
    <div class="field">
      <label for="exName">Exercise name</label>
      <input id="exName" autocomplete="off" placeholder="e.g. Cable row">
    </div>
    <div class="field">
      <label for="exSets">Number of sets</label>
      <input id="exSets" type="number" min="1" max="12" value="3" inputmode="numeric">
    </div>
    <button class="save-btn" id="btnSaveEx">Add to today</button>
    <button class="reset-btn" id="btnCloseSheet">Cancel</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ═══════════════════════════════════════════════════════
// WORKOUT PLAN — 33 exercises, Mon–Sun
// ═══════════════════════════════════════════════════════
const PLAN = [
  { id:'mon', short:'M', label:'Mon', title:'Legs (Quad Focus) + Tricep', focus:'Quads, hamstrings & tricep',
    exercises:[['Barbell Squat / Leg Press','3–4 × 6–8','RR 2'],['Leg Extension','3 × 10–15','RR 1'],
      ['Bulgarian Split Squat','2–3 × 8–12','RR 2'],['Hamstring Curl','3 × 10–15','RR 1'],
      ['Tricep Pushdown','3 × 10–15','RR 1'],['Overhead Tricep Extension','2 × 10–15','RR 1']]},
  { id:'tue', short:'T', label:'Tue', title:'Upper Pull + Shoulders + Bicep', focus:'Back, shoulders & bicep',
    exercises:[['Lat Pulldown / Pull Up','2–3 × 6–10','RR 2'],['Chest Supported Row','3 × 6–11','RR 2'],
      ['Single Arm Cable Pulldown','2–3 × 10–15','RR 1'],['Shoulder Press','2–3 × 8–10','RR 2'],
      ['Lateral Raise','3 × 12–20','RR 1'],['Rear Delt Fly','2–3 × 15–20','RR 1'],
      ['Hammer Curl','2–3 × 10–15','RR 1']]},
  { id:'wed', short:'W', label:'Wed', title:'Chest Focus', focus:'Chest & pec hypertrophy',
    exercises:[['Incline Barbell Press','2–3 × 6–10','RR 2'],['Flat DB / Smith Press','3 × 8–13','RR 2'],
      ['Cable Fly (High → Low)','3 × 12–15','RR 1'],['Machine Press (optional)','3 × 10–15','RR 1']]},
  { id:'thu', short:'T', label:'Thu', title:'Rest & Recover', focus:'Walk, stretch or do nothing', rest:true, exercises:[] },
  { id:'fri', short:'F', label:'Fri', title:'Legs (Hamstring Focus) + Tricep', focus:'Hamstrings, tricep & quads',
    exercises:[['Romanian Deadlift','3–4 × 6–10','RR 2'],['Lying Leg Curl','3 × 10–18','RR 1'],
      ['Leg Press (feet high)','2–3 × 10–15','RR 2'],['Leg Extension','3 × 10–15','RR 1'],
      ['Skullcrusher / Dip','3 × 6–12','RR 1'],['Tricep Pushdown','3 × 10–15','RR 1']]},
  { id:'sat', short:'S', label:'Sat', title:'Back + Shoulders (Hypertrophy)', focus:'Back & shoulder hypertrophy',
    exercises:[['Seated Cable Row','3 × 8–13','RR 2'],['Neutral Grip Pulldown','3 × 8–13','RR 2'],
      ['Single Arm Pulldown','3 × 12–16','RR 1'],['Rear Delt + Lateral Raise (Superset)','3 × 12–20','RR 1'],
      ['Shrugs','2–3 × 10–15','RR 1']]},
  { id:'sun', short:'S', label:'Sun', title:'Chest + Bicep', focus:'Chest & bicep hypertrophy',
    exercises:[['Incline DB Press','3 × 6–10','RR 2'],['Flat Press','3 × 6–10','RR 2'],
      ['Cable Fly (Low → High)','2–3 × 12–15','RR 1'],['Barbell Curl','3 × 6–12','RR 1'],
      ['Incline DB Curl','2 × 10–15','RR 1']]}
];

// ═══════════════════════════════════════════════════════
// DATE UTILS — always LOCAL date, never UTC
// ═══════════════════════════════════════════════════════
function localISO(d) {
  const Y = d.getFullYear();
  const M = String(d.getMonth() + 1).padStart(2, '0');
  const D = String(d.getDate()).padStart(2, '0');
  return `${Y}-${M}-${D}`;
}
function parseLocal(str) {
  const [y, m, d] = str.split('-').map(Number);
  return new Date(y, m - 1, d);
}
function localDOW(d) {
  return (d.getDay() + 6) % 7; // 0=Mon … 6=Sun
}

// ═══════════════════════════════════════════════════════
// STORAGE — keyed by YYYY-MM-DD (local), data never lost
// ═══════════════════════════════════════════════════════
const LOGS_KEY   = 'form-logs-v2';
const CUSTOM_KEY = 'form-custom-v2';
let logs   = JSON.parse(localStorage.getItem(LOGS_KEY)   || '{}');
let custom = JSON.parse(localStorage.getItem(CUSTOM_KEY) || '{}');
function saveLogs()   { localStorage.setItem(LOGS_KEY,   JSON.stringify(logs));   }
function saveCustom() { localStorage.setItem(CUSTOM_KEY, JSON.stringify(custom)); }

function getEntry(dateStr, idx) {
  if (!logs[dateStr])    logs[dateStr] = {};
  if (!logs[dateStr][idx]) logs[dateStr][idx] = { completed:false, open:false, sets:[] };
  return logs[dateStr][idx];
}

// ═══════════════════════════════════════════════════════
// STATE
// ═══════════════════════════════════════════════════════
const TODAY      = new Date();
const TODAY_ISO  = localISO(TODAY);
const TODAY_DOW  = localDOW(TODAY);

let selDate    = TODAY_ISO;
let selPlanIdx = TODAY_DOW;

let weekDates = [];

function buildWeek() {
  const d    = parseLocal(selDate);
  const dow  = localDOW(d);
  const mon  = new Date(d.getFullYear(), d.getMonth(), d.getDate() - dow);
  weekDates  = Array.from({length:7}, (_, i) =>
    localISO(new Date(mon.getFullYear(), mon.getMonth(), mon.getDate() + i))
  );
}

// ═══════════════════════════════════════════════════════
// PLAN HELPERS
// ═══════════════════════════════════════════════════════
function planDay(idx)  { return PLAN[idx]; }
function exList(idx)   { return [...PLAN[idx].exercises, ...(custom[PLAN[idx].id] || [])]; }

function progress(dateStr, planIdx) {
  const day = PLAN[planIdx];
  if (day.rest) return [0, 0];
  const exs = exList(planIdx);
  const done = exs.filter((_, i) => logs[dateStr]?.[i]?.completed).length;
  return [done, exs.length];
}

// ═══════════════════════════════════════════════════════
// RENDER — WEEK BAR
// ═══════════════════════════════════════════════════════
function renderWeek() {
  buildWeek();
  const el = document.getElementById('week');
  el.innerHTML = '';
  PLAN.forEach((day, i) => {
    const ds = weekDates[i];
    const [done, total] = progress(ds, i);
    const isSel  = ds === selDate;
    const isDone = total > 0 && done === total;
    const btn = document.createElement('button');
    btn.className = [
      'day',
      isSel  ? 'active' : '',
      day.rest ? 'rest' : '',
      isDone && !isSel ? 'done' : ''
    ].join(' ').trim();
    const dateNum = parseLocal(ds).getDate();
    btn.innerHTML = `${day.short}<b>${dateNum}</b>`;
    btn.onclick = () => { selDate = ds; selPlanIdx = i; render(); };
    el.appendChild(btn);
  });
}

// ═══════════════════════════════════════════════════════
// RENDER — HERO
// ═══════════════════════════════════════════════════════
function renderHero() {
  const day = planDay(selPlanIdx);
  const [done, total] = progress(selDate, selPlanIdx);
  const pct = total ? Math.round(done / total * 100) : 0;
  const el = document.getElementById('hero');
  el.className = 'hero';
  if (day.rest) {
    el.innerHTML =
      `<div class="hero-row"><div><div class="eyebrow">Recovery</div><h2>${day.title}</h2><p>${day.focus}</p></div>` +
      `<div class="score">☾<small>go easy</small></div></div>`;
  } else {
    el.innerHTML =
      `<div class="hero-row"><div><div class="eyebrow">Session</div><h2>${day.title}</h2><p>${day.focus}</p></div>` +
      `<div class="score">${pct}%<small>${done} of ${total}</small></div></div>` +
      `<div class="track"><div class="fill" style="width:${pct}%"></div></div>`;
  }
}

// ═══════════════════════════════════════════════════════
// RENDER — STATS
// ═══════════════════════════════════════════════════════
function renderStats() {
  let wDone = 0, wTotal = 0;
  PLAN.forEach((_, i) => {
    const [d, t] = progress(weekDates[i], i);
    wDone += d; wTotal += t;
  });
  document.getElementById('statWeek').textContent  = `${wDone} / ${wTotal}`;
  const [td, tt] = progress(selDate, selPlanIdx);
  document.getElementById('statToday').textContent = `${td} / ${tt}`;
}

// ═══════════════════════════════════════════════════════
// RENDER — EXERCISES
// ═══════════════════════════════════════════════════════
function setRowsHTML(ds, exIdx, ex) {
  const e = getEntry(ds, exIdx);
  const defSets = parseInt((ex[1]||'3').match(/\d+/)?.[0] || 3);
  while (e.sets.length < Math.max(2, defSets)) e.sets.push({weight:'',reps:'',done:false});
  return `<div class="sets-label"><span>Set</span><span>kg</span><span>reps</span><span></span></div>` +
    e.sets.map((s, si) =>
      `<div class="set"><div class="set-no">${si+1}</div>` +
      `<input type="number" inputmode="decimal" placeholder="—" value="${s.weight}" data-f="weight" data-d="${ds}" data-e="${exIdx}" data-s="${si}">` +
      `<input type="number" inputmode="numeric" placeholder="—" value="${s.reps}"  data-f="reps"   data-d="${ds}" data-e="${exIdx}" data-s="${si}">` +
      `<button class="set-done${s.done?' on':''}" data-sd data-d="${ds}" data-e="${exIdx}" data-i="${si}">✓</button></div>`
    ).join('') +
    `<button class="add-set" data-as data-d="${ds}" data-e="${exIdx}">+ Add set</button>`;
}

function renderWorkout() {
  const el  = document.getElementById('workout');
  const day = planDay(selPlanIdx);
  if (day.rest) {
    el.innerHTML =
      `<div class="rest-card"><div class="moon">☾</div><h2>Recovery counts.</h2>` +
      `<p>No training today — rest, walk, or do light mobility. Your body is adapting.</p></div>`;
    return;
  }
  const exs = exList(selPlanIdx);
  el.innerHTML =
    `<div class="section-head"><h3>Exercises</h3><button id="btnAddInline">+ Add</button></div>` +
    exs.map((ex, i) => {
      const e    = logs[selDate]?.[i];
      const done = e?.completed || false;
      const open = e?.open || false;
      return `<article class="exercise${done?' completed':''}${open?' open':''}">` +
        `<button class="exercise-main" data-tog="${i}">` +
        `<span class="check" data-chk="${i}">✓</span>` +
        `<span class="exercise-info"><span class="exercise-name">${ex[0]}</span>` +
        `<span class="exercise-meta">${ex[1]} · ${ex[2]||'log your work'}</span></span>` +
        `<span class="chevron">›</span></button>` +
        `<div class="detail">${setRowsHTML(selDate, i, ex)}</div></article>`;
    }).join('') +
    `<button class="reset-btn" id="btnResetDay">Reset this day's log</button>`;

  el.querySelectorAll('[data-tog]').forEach(btn => {
    btn.onclick = e => {
      if (e.target.closest('[data-chk]')) return;
      const i = +btn.dataset.tog;
      const entry = getEntry(selDate, i);
      entry.open = !entry.open;
      saveLogs(); renderWorkout();
    };
  });

  el.querySelectorAll('[data-chk]').forEach(span => {
    const go = e => {
      e.preventDefault(); e.stopPropagation();
      const i = +span.dataset.chk;
      const entry = getEntry(selDate, i);
      entry.completed = !entry.completed;
      saveLogs(); render();
      showToast(entry.completed ? 'Done ✓' : 'Reopened');
    };
    span.onclick  = go;
    span.onkeydown = e => { if (e.key==='Enter'||e.key===' ') go(e); };
  });

  el.querySelectorAll('[data-sd]').forEach(btn => {
    btn.onclick = () => {
      const e = getEntry(btn.dataset.d, +btn.dataset.e);
      e.sets[+btn.dataset.i].done = !e.sets[+btn.dataset.i].done;
      saveLogs(); renderWorkout();
    };
  });

  el.querySelectorAll('[data-as]').forEach(btn => {
    btn.onclick = () => {
      getEntry(btn.dataset.d, +btn.dataset.e).sets.push({weight:'',reps:'',done:false});
      saveLogs(); renderWorkout();
    };
  });

  el.querySelectorAll('[data-f]').forEach(inp => {
    inp.oninput = () => {
      getEntry(inp.dataset.d, +inp.dataset.e).sets[+inp.dataset.s][inp.dataset.f] = inp.value;
      saveLogs();
    };
  });

  const aBtn = document.getElementById('btnAddInline');
  if (aBtn) aBtn.onclick = openSheet;

  const rBtn = document.getElementById('btnResetDay');
  if (rBtn) rBtn.onclick = () => {
    if (!confirm(`Reset ${planDay(selPlanIdx).label}'s log?`)) return;
    delete logs[selDate];
    saveLogs(); render();
    showToast('Log reset');
  };
}

// ═══════════════════════════════════════════════════════
// MAIN RENDER
// ═══════════════════════════════════════════════════════
function render() {
  const d = parseLocal(selDate);
  document.getElementById('dateLabel').textContent =
    new Intl.DateTimeFormat('en-US', {weekday:'long', month:'short', day:'numeric'}).format(d);
  renderWeek();
  renderHero();
  renderStats();
  renderWorkout();
}

document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.onclick = () => {

// ═══════════════════════════════════════════════════════
// ADD EXERCISE SHEET
// ═══════════════════════════════════════════════════════
function openSheet() { document.getElementById('sheet').classList.add('show'); }
function closeSheet() { document.getElementById('sheet').classList.remove('show'); }

document.getElementById('btnAddEx').onclick = openSheet;
document.getElementById('btnCloseSheet').onclick = closeSheet;
document.getElementById('sheet').onclick = e => { if (e.target===document.getElementById('sheet')) closeSheet(); };
document.getElementById('btnSaveEx').onclick = () => {
  const name = document.getElementById('exName').value.trim();
  const sets = Math.min(12, Math.max(1, +document.getElementById('exSets').value || 3));
  if (!name) { document.getElementById('exName').focus(); return; }
  if (planDay(selPlanIdx).rest) { showToast('Pick a training day first'); return; }
  (custom[PLAN[selPlanIdx].id] ||= []).push([name, `${sets} sets`, '']);
  saveCustom();
  document.getElementById('exName').value = '';
  closeSheet();
  render();
  showToast('Exercise added');
};

// ═══════════════════════════════════════════════════════
// TOAST
// ═══════════════════════════════════════════════════════
function showToast(text) {
  const t = document.getElementById('toast');
  t.textContent = text;
  t.classList.add('show');
  clearTimeout(window._tt);
  window._tt = setTimeout(() => t.classList.remove('show'), 1900);
}

// ═══════════════════════════════════════════════════════
// BACKUP
// ═══════════════════════════════════════════════════════
document.getElementById('btnExport').onclick = () => {
  const blob = new Blob([JSON.stringify({logs, custom}, null, 2)], {type:'application/json'});
  const url  = URL.createObjectURL(blob);
  const a    = Object.assign(document.createElement('a'), {href:url, download:`form-backup-${TODAY_ISO}.json`});
  a.click(); URL.revokeObjectURL(url);
  showToast('Backup exported');
};
document.getElementById('btnImport').onclick = () => document.getElementById('fileInput').click();
document.getElementById('fileInput').onchange = e => {
  const f = e.target.files[0]; if (!f) return;
  const r = new FileReader();
  r.onload = ev => {
    try { const d = JSON.parse(ev.target.result); if (d.logs) { logs = d.logs; custom = d.custom||{}; saveLogs(); saveCustom(); render(); showToast('Restored!'); } } catch { alert('Invalid file.'); }
  };
  r.readAsText(f); e.target.value = '';
};
document.getElementById('btnReset').onclick = () => {
  if (!confirm('Erase ALL workout history?')) return;
  logs = {}; custom = {}; saveLogs(); saveCustom(); render(); showToast('Data cleared');
};

// ═══════════════════════════════════════════════════════
// CANVAS CHARTS — Responsive & iOS-safe Retina rendering
// ═══════════════════════════════════════════════════════
function sizeCanvas(id) {
  const canvas = document.getElementById(id);
  if (!canvas) return { ctx: null, W: 300, H: 180 };
  const wrap   = canvas.parentElement;
  const dpr    = Math.min(window.devicePixelRatio || 1, 3);
  const cssW   = wrap.clientWidth || 300;
  const cssH   = wrap.clientHeight || 180;

  if (canvas.width !== Math.floor(cssW * dpr) || canvas.height !== Math.floor(cssH * dpr)) {
    canvas.width  = Math.floor(cssW * dpr);
    canvas.height = Math.floor(cssH * dpr);
  }

  const ctx = canvas.getContext('2d');
  if (ctx.resetTransform) {
    ctx.resetTransform();
  } else {
    ctx.setTransform(1, 0, 0, 1, 0, 0);
  }
  ctx.scale(dpr, dpr);

  return { ctx, W: cssW, H: cssH };
}

function drawBar(ctx, x, y, w, h, r) {
  if (h <= 0) return;
  r = Math.min(r, w / 2, h / 2);
  ctx.beginPath();
  ctx.moveTo(x + r, y);
  ctx.lineTo(x + w - r, y);
  ctx.quadraticCurveTo(x + w, y, x + w, y + r);
  ctx.lineTo(x + w, y + h);
  ctx.lineTo(x, y + h);
  ctx.lineTo(x, y + r);
  ctx.quadraticCurveTo(x, y, x + r, y);
  ctx.closePath();
  ctx.fill();
}

function drawLine() {
  const { ctx, W, H } = sizeCanvas('cvLine');
  if (!ctx) return;
  ctx.clearRect(0, 0, W, H);
  const px = Math.max(20, W * 0.08), py = 20, cH = H - py * 2, cW = W - px * 2;

  const pts = Array.from({length:7}, (_, k) => {
    const d   = new Date(TODAY.getFullYear(), TODAY.getMonth(), TODAY.getDate() - (6 - k));
    const ds  = localISO(d);
    const dow = localDOW(d);
    const [done, total] = progress(ds, dow);
    const val = total > 0 ? done / total : 0;
    return { x: px + k * (cW / 6), y: H - py - val * (cH - 10), val, lbl: PLAN[dow].short };
  });

  ctx.strokeStyle = '#2b383b'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px, H - py); ctx.lineTo(W - px, H - py); ctx.stroke();

  const g = ctx.createLinearGradient(0, 0, 0, H);
  g.addColorStop(0, 'rgba(114,228,193,0.28)'); g.addColorStop(1, 'rgba(114,228,193,0)');
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  pts.forEach(p => ctx.lineTo(p.x, p.y));
  ctx.lineTo(pts[6].x, H - py); ctx.lineTo(pts[0].x, H - py); ctx.closePath();
  ctx.fillStyle = g; ctx.fill();

  ctx.strokeStyle = '#72e4c1'; ctx.lineWidth = 3; ctx.lineJoin = 'round';
  ctx.beginPath(); ctx.moveTo(pts[0].x, pts[0].y);
  pts.forEach(p => ctx.lineTo(p.x, p.y)); ctx.stroke();

  ctx.font = 'bold 10px -apple-system,sans-serif'; ctx.textAlign = 'center';
  pts.forEach(p => {
    ctx.beginPath(); ctx.arc(p.x, p.y, 4.5, 0, Math.PI * 2);
    ctx.fillStyle = p.val >= 1 ? '#c9f66b' : p.val > 0 ? '#72e4c1' : '#2b3c3f'; ctx.fill();
    ctx.fillStyle = '#9ba7a6'; ctx.fillText(p.lbl, p.x, H - 4);
  });

  const active = pts.filter(p => p.val > 0).length;
  document.getElementById('cStreak').textContent = active;
  document.getElementById('cRate').textContent   = `${Math.round(active / 7 * 100)}%`;
}

function drawBar_() {
  const { ctx, W, H } = sizeCanvas('cvBar');
  if (!ctx) return;
  ctx.clearRect(0, 0, W, H);
  const px = Math.max(16, W * 0.06), py = 20, cH = H - py * 2, cW = W - px * 2;
  const training = PLAN.map((d, i) => ({day: d, ds: weekDates[i], idx: i})).filter(x => !x.day.rest);
  const n = training.length, gap = cW / n, barW = Math.min(26, gap * 0.52);

  ctx.strokeStyle = '#2b383b'; ctx.lineWidth = 1;
  ctx.beginPath(); ctx.moveTo(px, H - py); ctx.lineTo(W - px, H - py); ctx.stroke();

  training.forEach(({day, ds, idx}, k) => {
    const [done, total] = progress(ds, idx);
    const ratio = total > 0 ? done / total : 0;
    const bH = Math.max(ratio * cH, ratio > 0 ? 4 : 0);
    const x  = px + k * gap + (gap - barW) / 2;
    const y  = H - py - bH;
    ctx.fillStyle = done === total && total > 0 ? '#c9f66b' : '#72e4c1';
    drawBar(ctx, x, y, barW, bH, 5);
    ctx.fillStyle = '#9ba7a6';
    ctx.font = '9px -apple-system,sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(day.short, x + barW / 2, H - 4);
    if (total > 0) {
      ctx.fillStyle = done === total ? '#c9f66b' : '#72e4c1';
      const ty = (bH > 20) ? y - 4 : y - 8;
      ctx.fillText(`${done}/${total}`, x + barW / 2, Math.max(ty, py + 12));
    }
  });
}

function drawDot() {
  const { ctx, W, H } = sizeCanvas('cvDot');
  if (!ctx) return;
  ctx.clearRect(0, 0, W, H);
  const [done, total] = progress(selDate, selPlanIdx);
  const remain = Math.max(0, total - done);

  const isSmall = W < 480;

  let cx, cy, r, lx, ly, isStacked = false;
  if (isSmall) {
    cx = W / 2;
    cy = 68;
    r = Math.min(W * 0.24, 44);
    isStacked = true;
  } else {
    cx = W / 3;
    cy = H / 2;
    r = Math.min(W * 0.28, H * 0.35, 52);
    lx = W / 1.65;
    ly = H / 2 - 18;
  }

  // Track
  ctx.lineWidth = isSmall ? 13 : 16;
  ctx.lineCap = 'round';
  ctx.strokeStyle = '#1f2e30';
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.stroke();

  // Done arc
  if (done > 0) {
    const end = -Math.PI / 2 + (done / Math.max(total, 1)) * Math.PI * 2;
    ctx.strokeStyle = done === total ? '#c9f66b' : '#72e4c1';
    ctx.beginPath();
    ctx.arc(cx, cy, r, -Math.PI / 2, end);
    ctx.stroke();
  }

  // Center text
  const pct = total > 0 ? Math.round((done / total) * 100) : 0;
  ctx.textAlign = 'center';
  ctx.fillStyle = '#f6f7f4';
  ctx.font = `bold ${isSmall ? 16 : 19}px -apple-system, sans-serif`;
  ctx.fillText(`${pct}%`, cx, cy + (isSmall ? 4 : 5));
  ctx.fillStyle = '#9ba7a6';
  ctx.font = `${isSmall ? 9 : 10}px -apple-system, sans-serif`;
  ctx.fillText('complete', cx, cy + (isSmall ? 15 : 17));

  // Legend
  ctx.textAlign = 'left';
  ctx.font = '11px -apple-system, sans-serif';

  if (isStacked) {
    const legY = 145;
    const item1X = W / 2 - 75;
    const item2X = W / 2 + 10;

    ctx.fillStyle = done === total && total > 0 ? '#c9f66b' : '#72e4c1';
    ctx.fillRect(item1X, legY, 10, 10);
    ctx.fillStyle = '#f6f7f4';
    ctx.fillText(`Done (${done})`, item1X + 14, legY + 9);

    ctx.fillStyle = '#1f2e30';
    ctx.fillRect(item2X, legY, 10, 10);
    ctx.fillStyle = '#9ba7a6';
    ctx.fillText(`Left (${remain})`, item2X + 14, legY + 9);
  } else {
    ctx.fillStyle = done === total && total > 0 ? '#c9f66b' : '#72e4c1';
    ctx.fillRect(lx, ly, 10, 10);
    ctx.fillStyle = '#f6f7f4';
    ctx.fillText(`Done (${done})`, lx + 14, ly + 9);

    ctx.fillStyle = '#1f2e30';
    ctx.fillRect(lx, ly + 22, 10, 10);
    ctx.fillStyle = '#9ba7a6';
    ctx.fillText(`Left (${remain})`, lx + 14, ly + 31);
  }
}

function drawAllCharts() {
  try { drawLine(); } catch(e) { console.warn('line chart', e); }
  try { drawBar_(); } catch(e) { console.warn('bar chart',  e); }
  try { drawDot(); }  catch(e) { console.warn('dot chart',  e); }
}

function scheduleCharts() {
  requestAnimationFrame(() => requestAnimationFrame(drawAllCharts));
}

let resizeDebounceTimer = null;
function handleResize() {
  if (resizeDebounceTimer) clearTimeout(resizeDebounceTimer);
  resizeDebounceTimer = setTimeout(() => {
    if (document.getElementById('view-charts')?.classList.contains('active')) {
      scheduleCharts();
    }
  }, 100);
}

window.addEventListener('resize', handleResize, { passive: true });
window.addEventListener('orientationchange', handleResize, { passive: true });
window.addEventListener('pageshow', handleResize, { passive: true });
document.addEventListener('visibilitychange', () => {
  if (!document.hidden && document.getElementById('view-charts')?.classList.contains('active')) {
    scheduleCharts();
  }
}, { passive: true });

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('./sw.js').catch(()=>{}));
